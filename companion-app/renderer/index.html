<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';">
  <title>Dopl Connect</title>
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/setup.css">
  <link rel="stylesheet" href="styles/chat.css">
  <link rel="stylesheet" href="styles/input-bar.css">
  <link rel="stylesheet" href="styles/controls.css">
</head>
<body>

  <!-- ── Setup Screen ─────────────────────────────────────────────────── -->
  <div id="screen-setup" class="screen active">
    <div class="setup-card">
      <div class="window-controls">
        <button class="wc-btn wc-close" id="wc-close-setup" title="Close">
          <svg width="6" height="6" viewBox="0 0 6 6"><path d="M0.5 0.5L5.5 5.5M5.5 0.5L0.5 5.5" stroke="currentColor" stroke-width="1.2"/></svg>
        </button>
        <button class="wc-btn wc-minimize" id="wc-min-setup" title="Minimize">
          <svg width="6" height="2" viewBox="0 0 6 2"><path d="M0.5 1H5.5" stroke="currentColor" stroke-width="1.2"/></svg>
        </button>
        <button class="wc-btn wc-zoom" id="wc-zoom-setup" title="Zoom">
          <svg width="6" height="6" viewBox="0 0 6 6"><path d="M0.5 2L3 0.5L5.5 2M0.5 4L3 5.5L5.5 4" stroke="currentColor" stroke-width="1"/></svg>
        </button>
      </div>
      <div class="logo">Dopl</div>
      <p class="subtitle">Connect your machine to your cloud AI instance</p>
      <input
        id="token-input"
        type="text"
        placeholder="Paste your connection token"
        spellcheck="false"
        autocomplete="off"
      />
      <button id="btn-connect" class="btn-primary">Connect</button>
      <p id="error-msg" class="error"></p>
    </div>
  </div>

  <!-- ── Chat Screen ──────────────────────────────────────────────────── -->
  <div id="screen-chat" class="screen">

    <!-- Chat Panel (collapsible, floats above input bar) -->
    <div id="chat-panel" class="chat-panel">
      <div id="chat-header" class="chat-panel-header">
        <div class="window-controls">
          <button class="wc-btn wc-close" id="wc-close-chat" title="Close">
            <svg width="6" height="6" viewBox="0 0 6 6"><path d="M0.5 0.5L5.5 5.5M5.5 0.5L0.5 5.5" stroke="currentColor" stroke-width="1.2"/></svg>
          </button>
          <button class="wc-btn wc-minimize" id="wc-min-chat" title="Minimize">
            <svg width="6" height="2" viewBox="0 0 6 2"><path d="M0.5 1H5.5" stroke="currentColor" stroke-width="1.2"/></svg>
          </button>
          <button class="wc-btn wc-zoom" id="wc-zoom-chat" title="Zoom">
            <svg width="6" height="6" viewBox="0 0 6 6"><path d="M0.5 2L3 0.5L5.5 2M0.5 4L3 5.5L5.5 4" stroke="currentColor" stroke-width="1"/></svg>
          </button>
        </div>
        <span id="chat-title" class="chat-title">Select a conversation</span>
        <div style="display:flex;align-items:center;gap:2px;-webkit-app-region:no-drag;">
          <!-- Glass tint toggle -->
          <button id="btn-tint" class="btn-icon btn-tint-icon" title="Adjust glass tint">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="6.5" cy="6.5" r="2.5" stroke="currentColor" stroke-width="1.3"/>
              <path d="M6.5 1V2M6.5 11V12M1 6.5H2M11 6.5H12M2.636 2.636l.707.707M9.657 9.657l.707.707M2.636 10.364l.707-.707M9.657 3.343l.707-.707" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
          </button>
          <button id="btn-disconnect" class="btn-icon btn-disconnect-icon" title="Disconnect">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 1L11 11M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Tint Slider Row (toggleable) -->
      <div id="tint-row" class="tint-row hidden">
        <span class="tint-label">TINT</span>
        <input id="tint-slider" class="tint-slider" type="range" min="0" max="0.7" step="0.01" value="0.15">
        <span class="tint-label" id="tint-value-label">15%</span>
      </div>

      <!-- Messages -->
      <div id="messages-area" class="messages-area">
        <div id="messages-list" class="messages-list">
          <!-- Messages rendered here -->
        </div>
        <div id="typing-indicator" class="typing-indicator hidden">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <!-- Input bar wrapper (houses dropdown + pill bar) -->
    <div class="input-bar-wrapper">

      <!-- Conversation Dropdown (appears above the input bar) -->
      <div id="conv-dropdown" class="conv-dropdown hidden">
        <button id="btn-new-chat" class="btn-new-chat">+ New Chat</button>
        <div id="conv-list" class="conv-list">
          <!-- Populated by conversations.js -->
        </div>
      </div>

      <!-- Pill-shaped Input Bar -->
      <div class="input-bar-glass">

        <!-- Connection status dot -->
        <div id="conn-dot" class="conn-dot disconnected" title="Disconnected"></div>

        <!-- Conversation selector pill -->
        <button id="conv-selector" class="conv-selector-pill">
          <span id="conv-selector-text">New Chat</span>
          <svg width="8" height="5" viewBox="0 0 8 5" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 4L4 1L1 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <!-- Text input -->
        <textarea
          id="msg-input"
          class="msg-input"
          placeholder="Message… (Enter to send)"
          rows="1"
          disabled
        ></textarea>

        <!-- Audio transcription button (placeholder) -->
        <button id="btn-audio" class="btn-icon" title="Audio transcription (coming soon)">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4.5" y="0.75" width="6" height="8.5" rx="3" stroke="currentColor" stroke-width="1.3"/>
            <path d="M2 7.5C2 10.538 4.5 12.5 7.5 12.5S13 10.538 13 7.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            <path d="M7.5 12.5V14.25" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </button>

        <!-- Send button -->
        <button id="btn-send" class="btn-icon btn-send-icon" disabled>
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M14.5 1.5L7 9M14.5 1.5L10 14.5L7 9M14.5 1.5L1.5 5.5L7 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <!-- Toggle chat panel button -->
        <button id="btn-toggle-chat" class="btn-icon" title="Toggle chat">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="1" width="13" height="13" rx="2.5" stroke="currentColor" stroke-width="1.3"/>
            <path d="M1 5h13" stroke="currentColor" stroke-width="1.3"/>
          </svg>
        </button>

      </div>
    </div>

  </div>

  <script src="js/utils.js"></script>
  <script src="js/conversations.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
